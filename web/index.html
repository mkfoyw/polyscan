<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyScan Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
}
/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-wrap: wrap;
}
.topbar-label {
  font-size: 12px;
  color: #8b949e;
  margin-right: 4px;
}
.col-toggle {
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid #30363d;
  background: transparent;
  color: #8b949e;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.col-toggle:hover { border-color: #58a6ff; color: #58a6ff; }
.col-toggle.active {
  background: #1f6feb;
  border-color: #1f6feb;
  color: #fff;
}
.col-toggle.active:hover { background: #1a5fd4; }
.dashboard {
  display: grid;
  gap: 16px;
  padding: 16px;
  height: calc(100vh - 45px);
  box-sizing: border-box;
}
@media (max-width: 1400px) {
  html, body { overflow: auto; }
  .dashboard { height: auto; }
  .column { min-height: 60vh; }
}
@media (max-width: 768px) {
  .dashboard { grid-template-columns: 1fr !important; }
}
.column {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}
.column.hidden { display: none; }
.column-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid #30363d;
}
.column-header h2 {
  font-size: 16px;
  font-weight: 600;
  color: #e6edf3;
  margin-bottom: 4px;
}
.column-header .subtitle {
  font-size: 12px;
  color: #8b949e;
}
.filters {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  padding: 5px 12px;
  border-radius: 16px;
  border: 1px solid #30363d;
  background: transparent;
  color: #8b949e;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: #58a6ff; color: #58a6ff; }
.filter-btn.active {
  background: #1f6feb;
  border-color: #1f6feb;
  color: #fff;
}
.price-range {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 16px 10px;
  font-size: 12px;
  color: #8b949e;
}
.price-range label { white-space: nowrap; }
.price-range input[type=number] {
  width: 60px;
  padding: 4px 8px;
  border-radius: 8px;
  border: 1px solid #30363d;
  background: #161b22;
  color: #c9d1d9;
  font-size: 12px;
  -moz-appearance: textfield;
}
.price-range input[type=number]::-webkit-inner-spin-button,
.price-range input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.price-range input[type=number]:focus { border-color: #1f6feb; outline: none; }
.price-range .sep { color: #484f58; }
.price-ticks {
  display: flex;
  gap: 2px;
  padding: 0 16px 8px;
  flex-wrap: wrap;
}
.price-ticks button {
  padding: 2px 6px;
  border-radius: 10px;
  border: 1px solid #30363d;
  background: transparent;
  color: #6e7681;
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.price-ticks button:hover { border-color: #58a6ff; color: #58a6ff; }
.sm-actions { display:inline-flex; gap:4px; margin-left:6px; flex-shrink:0; vertical-align:middle; }
.sm-act { padding:1px 5px; border-radius:5px; border:1px solid #30363d; background:transparent; color:#6e7681; font-size:10px; cursor:pointer; transition:all .15s; line-height:1.4; }
.sm-act:hover { border-color:#58a6ff; color:#58a6ff; }
.sm-act.del:hover { border-color:#f85149; color:#f85149; }
.sm-act.down:hover { border-color:#d29922; color:#d29922; }
.list {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  
  
}
.list::-webkit-scrollbar { width: 4px; }
.list::-webkit-scrollbar-track { background: transparent; }
.list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
.item {
  display: flex;
  align-items: flex-start;
  padding: 12px 16px;
  border-bottom: 1px solid #21262d;
  gap: 10px;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  
  
}
.item:hover { background: #1c2128; }
.item-icon {
  width: 36px; height: 36px; border-radius: 8px; background: #30363d;
  flex-shrink: 0; overflow: hidden; display: flex; align-items: center;
  justify-content: center; font-size: 18px;
}
.item-icon img { width: 100%; height: 100%; object-fit: cover; }
.item-body { flex: 1; min-width: 0; }
.item-title {
  font-size: 13px; color: #e6edf3; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.item-meta { font-size: 11px; color: #8b949e; margin-top: 3px; }
.item-right { text-align: right; flex-shrink: 0; }
.price-change { font-size: 14px; font-weight: 600; white-space: nowrap; }
.price-change.positive { color: #3fb950; }
.price-change.negative { color: #f85149; }
.price-pct { font-size: 11px; margin-top: 2px; }
.price-pct.positive { color: #3fb950; }
.price-pct.negative { color: #f85149; }
.trade-header { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.trade-user {
  font-size: 13px; font-weight: 500; color: #58a6ff;
  max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.trade-user.no-link { color: #8b949e; cursor: default; text-decoration: none; }
.trade-badge { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 4px; }
.trade-badge.buy { background: rgba(63,185,80,0.15); color: #3fb950; }
.trade-badge.sell { background: rgba(248,81,73,0.15); color: #f85149; }
.trade-amount { font-size: 13px; font-weight: 600; color: #e6edf3; }
.trade-outcome { font-size: 12px; font-weight: 500; margin-left: 4px; }
.trade-outcome.yes { color: #3fb950; }
.trade-outcome.no { color: #f85149; }
.trade-price { font-size: 12px; color: #8b949e; }
.trade-question {
  font-size: 12px; color: #8b949e; margin-top: 2px;
  display: -webkit-box; -webkit-line-clamp: 1; line-clamp: 1;
  -webkit-box-orient: vertical; overflow: hidden;
}
.trade-question a { color: #8b949e; text-decoration: none; }
.trade-question a:hover { color: #58a6ff; }
.trade-time { font-size: 11px; color: #6e7681; margin-top: 2px; }
.settlement-outcome {
  font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px; white-space: nowrap;
}
.settlement-outcome.yes { background: rgba(63,185,80,0.15); color: #3fb950; }
.settlement-outcome.no { background: rgba(248,81,73,0.15); color: #f85149; }
.avatar {
  width: 36px; height: 36px; border-radius: 50%; background: #30363d;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #8b949e; overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.empty-state { padding: 40px 16px; text-align: center; color: #6e7681; font-size: 13px; }
.item-icon-wrap { position: relative; }
.icon-check {
  position: absolute; bottom: -2px; right: -2px; width: 16px; height: 16px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #fff;
}
.icon-check.yes { background: #3fb950; }
.icon-check.no { background: #f85149; }
.column.drag-over { border: 2px dashed #58a6ff; }

/* Whale add modal */
.whale-modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:rgba(0,0,0,.55);align-items:center;justify-content:center}
.whale-modal-overlay.open{display:flex}
.whale-modal{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:24px;width:420px;max-width:90vw;box-shadow:0 16px 48px rgba(0,0,0,.4)}
.whale-modal h3{font-size:15px;color:#e6edf3;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.whale-modal .wm-close{margin-left:auto;cursor:pointer;color:#484f58;font-size:16px;padding:2px 6px;border-radius:4px}
.whale-modal .wm-close:hover{color:#e6edf3;background:rgba(255,255,255,.06)}
.wm-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.wm-row:last-child{margin-bottom:0}
.wm-row label{font-size:12px;color:#8b949e;white-space:nowrap;min-width:52px}
.wm-row input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:13px;outline:none;transition:border-color .15s}
.wm-row input:focus{border-color:#58a6ff}
.wm-row input::placeholder{color:#484f58}
.wm-btn{padding:7px 16px;border-radius:8px;border:none;font-size:12px;cursor:pointer;font-weight:500;background:#238636;color:#fff;transition:all .15s}
.wm-btn:hover{background:#2ea043}
.wm-btn:disabled{opacity:.5;cursor:not-allowed}
.wm-btn:active{transform:scale(.97)}
.wm-toast-wrap{position:fixed;top:50px;right:16px;z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.wm-toast{font-size:12px;padding:8px 14px;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:wmSlide .2s ease;max-width:320px;pointer-events:auto}
.wm-toast.ok{background:#0d2818;color:#3fb950;border:1px solid rgba(63,185,80,.3)}
.wm-toast.err{background:#2d1214;color:#f85149;border:1px solid rgba(248,81,73,.3)}
@keyframes wmSlide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>

<!-- Top bar: column selector -->

<script>
const API = '';
const PAGE_SIZE = 30;

// ============================================================
// Column visibility & order (persisted to localStorage)
// ============================================================
const ALL_COLUMNS = ['price-moves', 'trades', 'whale-trades', 'smart-money', 'new-markets', 'settlements'];
const DEFAULT_VISIBLE = ['price-moves', 'trades', 'whale-trades', 'new-markets'];
const DEFAULT_ORDER   = ['price-moves', 'trades', 'whale-trades', 'smart-money', 'new-markets', 'settlements'];

function loadColumnConfig() {
  try {
    const raw = localStorage.getItem('polyscan_columns');
    if (raw) {
      const cfg = JSON.parse(raw);
      if (Array.isArray(cfg.visible) && Array.isArray(cfg.order)) return cfg;
    }
  } catch (e) {}
  return { visible: [...DEFAULT_VISIBLE], order: [...DEFAULT_ORDER] };
}

function saveColumnConfig() {
  localStorage.setItem('polyscan_columns', JSON.stringify({ visible: visibleCols, order: columnOrder }));
}

let { visible: visibleCols, order: columnOrder } = loadColumnConfig();

// Ensure new columns are in order list
for (const c of ALL_COLUMNS) {
  if (!columnOrder.includes(c)) columnOrder.push(c);
}

function applyColumnLayout() {
  const dashboard = document.getElementById('dashboard');
  const count = visibleCols.length || 1;
  dashboard.style.gridTemplateColumns = `repeat(${count}, 1fr)`;

  // Reorder DOM nodes, show/hide
  for (const colId of columnOrder) {
    const el = document.getElementById('col-' + colId);
    if (!el) continue;
    dashboard.appendChild(el);
    if (visibleCols.includes(colId)) {
      el.classList.remove('hidden');
    } else {
      el.classList.add('hidden');
    }
  }

  // Sync toggle buttons
  document.querySelectorAll('.col-toggle').forEach(btn => {
    btn.classList.toggle('active', visibleCols.includes(btn.dataset.col));
  });

  saveColumnConfig();
}

  if (col === 'smart-money' && visibleCols.includes(col)) fetchSmartMoneyTrades();
});

// --- Drag & Drop reorder ---
let dragSrcId = null;

document.querySelectorAll('.column[draggable]').forEach(col => {
  col.addEventListener('dragstart', e => {
    dragSrcId = col.id.replace('col-', '');
    e.dataTransfer.effectAllowed = 'move';
    col.style.opacity = '0.5';
  });
  col.addEventListener('dragend', () => {
    col.style.opacity = '1';
    document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
  });
  col.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    col.classList.add('drag-over');
  });
  col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
  col.addEventListener('drop', e => {
    e.preventDefault();
    col.classList.remove('drag-over');
    const targetId = col.id.replace('col-', '');
    if (dragSrcId && dragSrcId !== targetId) {
      const srcIdx = columnOrder.indexOf(dragSrcId);
      const tgtIdx = columnOrder.indexOf(targetId);
      columnOrder.splice(srcIdx, 1);
      columnOrder.splice(tgtIdx, 0, dragSrcId);
      applyColumnLayout();
    }
    dragSrcId = null;
  });
});

function setupInfiniteScroll(listId, pagingKey, fetchFn) {
  const list = document.getElementById(listId);
  let ticking = false;
  list.addEventListener('scroll', () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      ticking = false;
      if (paging[pagingKey].loading || paging[pagingKey].done) return;
      if (list.scrollTop + list.clientHeight >= list.scrollHeight - 100) {
        fetchFn(true);
      }
    });
  }, { passive: true });
}

let _pmCtrl = null;
async function fetchPriceMoves() {
  if (_pmCtrl) _pmCtrl.abort();
  _pmCtrl = new AbortController();
  try {
    const resp = await fetch(`${API}/api/price-moves?window=${priceWindow}&limit=50&_t=${Date.now()}`, { signal: _pmCtrl.signal });
    const data = await resp.json();
    renderPriceMoves(data || []);
  } catch (e) {
    if (e.name !== 'AbortError') console.error('fetchPriceMoves:', e);
  }
}

async function fetchTrades(loadMore) {
  const p = paging.trades;
  if (p.loading) return;
  p.loading = true;
  try {
    let url = `${API}/api/trades?min_usd=${tradeMinUSD}&limit=${PAGE_SIZE}&_t=${Date.now()}${tradeMaxPrice > 0 ? '&max_price=' + tradeMaxPrice : ''}${tradeMinPrice > 0 ? '&min_price=' + tradeMinPrice : ''}`;
    if (loadMore && p.cursor) url += `&before=${p.cursor}`;
    const resp = await fetch(url);
    const data = await resp.json();
    const items = data || [];
    if (items.length < PAGE_SIZE) p.done = true;
    if (items.length > 0) p.cursor = items[items.length - 1].timestamp;
    if (loadMore) appendTrades(items); else renderTrades(items);
  } catch (e) {
    console.error('fetchTrades:', e);
  } finally {
    p.loading = false;
  }
}

async function fetchWhaleTrades(loadMore) {
  const p = paging.whaleTrades;
  if (p.loading) return;

    let url = `${API}/api/whale-trades?limit=${PAGE_SIZE}&min_usd=1000&_t=${Date.now()}${whaleMaxPrice > 0 ? '&max_price=' + whaleMaxPrice : ''}`;
    if (loadMore && p.cursor) url += `&before=${p.cursor}`;
    const resp = await fetch(url);
    const data = await resp.json();
    const items = data || [];
    if (items.length < PAGE_SIZE) p.done = true;
    if (items.length > 0) p.cursor = items[items.length - 1].timestamp;
    // Update whale address set from returned trades
    if (!loadMore) {
      whaleAddressSet.clear();
      // Also fetch whale list to populate the set
      try {
        const wr = await fetch(`${API}/api/whales`);
        const wl = await wr.json();
        (wl || []).forEach(w => whaleAddressSet.add((w.address || '').toLowerCase()));
      } catch (_) {}
    }
    if (loadMore) appendWhaleTrades(items); else renderWhaleTrades(items);
  } catch (e) {
    console.error('fetchWhaleTrades:', e);
  } finally {
    p.loading = false;
  }
}

const PRESET_CATS = ['Politics', 'Sports', 'Crypto', 'Finance', 'Geopolitics', 'Tech', 'Culture', 'World', 'Economy', 'Elections'];

function updateCategoryButtons(markets) {
  const counts = {};
  for (const m of markets) {
    const c = m.category || '';
    if (c) counts[c] = (counts[c] || 0) + 1;
  }
  const seen = new Set(PRESET_CATS);
  const extras = Object.keys(counts).filter(c => !seen.has(c)).sort((a, b) => (counts[b] || 0) - (counts[a] || 0));
  const allCats = [...PRESET_CATS, ...extras];
  const container = document.getElementById('market-filters');
  let html = '<button class="filter-btn' + (marketCategory === 'all' ? ' active' : '') + '" data-cat="all">All</button>';
  for (const cat of allCats) {
    const cnt = counts[cat] || 0;
    const active = marketCategory === cat ? ' active' : '';
    const label = cnt > 0 ? `${esc(cat)} (${cnt})` : esc(cat);
    html += `<button class="filter-btn${active}" data-cat="${esc(cat)}">${label}</button>`;
  }
  container.innerHTML = html;
}

function mergeTrades(items) {
  if (!items.length) return items;
  const merged = [];
  let cur = null, curKey = '';
  for (const t of items) {
    const k = (t.proxy_wallet||'') + '|' + (t.title||'') + '|' + (t.outcome||'') + '|' + (t.side||'');
    if (cur && curKey === k) {
      cur.usd_value = (cur.usd_value||0) + (t.usd_value||0);
      cur._count++;
      if (t.price != null) { cur._minP = Math.min(cur._minP, t.price); cur._maxP = Math.max(cur._maxP, t.price); }
      if (t.timestamp && t.timestamp < cur.timestamp) cur._oldestTs = t.timestamp;
    } else {
      if (cur) merged.push(cur);
      cur = Object.assign({}, t, { _count: 1, _minP: t.price != null ? t.price : 1, _maxP: t.price != null ? t.price : 0, _oldestTs: t.timestamp });
      curKey = k;
    }
  }
  if (cur) merged.push(cur);
  return merged;
}

function renderSmartMoneyTrades(trades) {
  const list = document.getElementById('sm-trade-list');
  if (trades.length === 0) {
    list.innerHTML = '<div class="empty-state">暂无聪明钱交易数据<br>当确认的聪明钱钱包有交易时会显示在这里</div>';
    return;
  }
  list.innerHTML = mergeTrades(trades).map(renderSmTradeItem).join('');
}

function tradeKey(t) {
  if (t.transaction_hash) return 'tx:' + t.transaction_hash;
  return (t.asset || '') + ':' + (t.timestamp || 0);
}

function renderTradeItem(t) {
  return _renderTradeItem(t, false);
}
function renderSmTradeItem(t) {
  return _renderTradeItem(t, true);
}
function _renderTradeItem(t, showSmActions) {
  const rawName = t.profile_name || t.pseudonym || shortAddr(t.proxy_wallet) || '匿名';
  const name = rawName.length > 20 ? rawName.slice(0, 17) + '...' : rawName;
  const side = (t.side || '').toUpperCase();
  const sideLabel = side === 'BUY' ? '买入' : '卖出';
  const sideCls = side === 'BUY' ? 'buy' : 'sell';
  const outcomeCls = (t.outcome || '').toLowerCase() === 'yes' ? 'yes' : 'no';
  const usd = formatUSD(t.usd_value);
  const count = (t._count || 1);
  const countTag = count > 1 ? `<span style="color:#6e7681;font-size:11px;margin-left:2px">×${count}</span>` : '';
  var priceCents = '';
  if (t.price != null) {
    if (count > 1 && t._minP !== t._maxP) {
      priceCents = (t._minP * 100).toFixed(1).replace(/\.0$/, '') + '-' + (t._maxP * 100).toFixed(1).replace(/\.0$/, '') + '¢';
    } else {
      priceCents = (t.price * 100).toFixed(1).replace(/\.0$/, '') + '¢';
    }
  }
  const timeAgo = relativeTime(t.timestamp);
  const profileUrl = t.proxy_wallet ? `https://polymarket.com/profile/${t.proxy_wallet}` : '';
  const userTag = profileUrl
    ? `<a class="trade-user" href="${esc(profileUrl)}" target="_blank">${esc(name)}</a>`
    : `<span class="trade-user no-link">${esc(name)}</span>`;
  const key = esc(tradeKey(t));
  const ts = t.timestamp || 0;
  return `<div class="item" data-key="${key}" data-ts="${ts}">
    <div class="avatar">${name.charAt(0).toUpperCase()}</div>
    <div class="item-body">
      <div class="trade-header">
        ${userTag}
        <span class="trade-badge ${sideCls}">${sideLabel}</span>
        <span class="trade-amount">${usd}</span>${countTag}
        ${priceCents ? `<span class="trade-price">@${priceCents}</span>` : ''}
        <span class="trade-outcome ${outcomeCls}">${esc(t.outcome || '')}</span>
      </div>
      <div class="trade-question">${t.title ? (() => {
        const eventUrl = t.event_slug
          ? 'https://polymarket.com/event/' + encodeURIComponent(t.event_slug)
          : (t.slug ? 'https://polymarket.com/market/' + encodeURIComponent(t.slug) : '');
        return eventUrl
          ? '<a href="' + esc(eventUrl) + '" target="_blank" style="color:#8b949e;text-decoration:none">' + esc(t.title) + '</a>'
          : esc(t.title);
      })() : ''}</div>
      <div class="trade-time" data-ts="${ts}">${timeAgo}${showSmActions && t.proxy_wallet ? `<span class="sm-actions">
        <button class="sm-act" onclick="smRename('${esc(t.proxy_wallet)}')" title="修改昵称">✏</button>
        <button class="sm-act down" onclick="smDown('${esc(t.proxy_wallet)}')" title="降级为拒绝">⬇</button>
        <button class="sm-act del" onclick="smDel('${esc(t.proxy_wallet)}')" title="删除聪明钱">✖</button>
      </span>` : ''}</div>
    </div>
  </div>`;
}

function prependSmartMoneyTrade(item) {
  const list = document.getElementById('sm-trade-list');
  const empty = list.querySelector('.empty-state');
  if (empty) empty.remove();
  if (smMaxPrice > 0 && (item.price || 0) > smMaxPrice) return;
  const key = tradeKey(item);
  const ts = item.timestamp || 0;
  const existing = list.querySelector(`[data-key="${CSS.escape(key)}"]`);
  if (existing) { existing.outerHTML = renderSmTradeItem(item); return; }
  const items = list.querySelectorAll('.item[data-ts]');
  let inserted = false;
  for (const el of items) {
    if (ts > (parseInt(el.dataset.ts, 10) || 0)) {
      el.insertAdjacentHTML('beforebegin', renderSmTradeItem(item));
      inserted = true;
      break;
    }
  }
  if (!inserted) list.insertAdjacentHTML('beforeend', renderSmTradeItem(item));
}

function prependTrade(item) {
  _prependTradeToList('trade-list', item, true);
  // Only push to whale list if this wallet is a tracked whale
  if (visibleCols.includes('whale-trades') && item.proxy_wallet &&
      whaleAddressSet.has((item.proxy_wallet || '').toLowerCase())) {
    _prependTradeToList('whale-trade-list', item, false);
  }
}

function _prependTradeToList(listId, item, applyFilters) {
  const list = document.getElementById(listId);
  const empty = list.querySelector('.empty-state');
  if (empty) empty.remove();

  const key = tradeKey(item);
  const ts = item.timestamp || 0;

  if (applyFilters) {
    if ((item.usd_value || 0) < tradeMinUSD) return;
    if (tradeMaxPrice > 0 && (item.price || 0) > tradeMaxPrice) return;
    if (tradeMinPrice > 0 && (item.price || 0) < tradeMinPrice) return;
  }

  // Deduplicate by key
  const existing = list.querySelector(`[data-key="${CSS.escape(key)}"]`);
  if (existing) { existing.outerHTML = renderTradeItem(item); return; }

  // WS→REST enrichment dedup
  if (item.transaction_hash && item.asset) {
    const allItems = list.querySelectorAll('.item[data-ts]');
    for (const el of allItems) {
      const elTS = parseInt(el.dataset.ts, 10) || 0;
      if (Math.abs(ts - elTS) <= 10) { el.outerHTML = renderTradeItem(item); return; }
    }
  }

  // Insert sorted (timestamp DESC)
  const items = list.querySelectorAll('.item[data-ts]');
  let inserted = false;
  for (const el of items) {
    if (ts > (parseInt(el.dataset.ts, 10) || 0)) {
      el.insertAdjacentHTML('beforebegin', renderTradeItem(item));
      inserted = true;
      break;
    }
  }
  if (!inserted) list.insertAdjacentHTML('beforeend', renderTradeItem(item));
}

function appendNewMarkets(items) {
  const list = document.getElementById('market-list');
  const empty = list.querySelector('.empty-state');
  if (empty) empty.remove();
  list.insertAdjacentHTML('beforeend', items.map(renderMarketItem).join(''));

function appendSettlements(items) {

function prependSettlement(item) {

// ============================================================
// SSE
// ============================================================
function connectSSE() {
  const evtSource = new EventSource(`${API}/api/events`);
  evtSource.onmessage = function(event) {
    try {
      const evt = JSON.parse(event.data);
      switch (evt.type) {
        case 'trade': prependTrade(evt.data); break;
        case 'settlement': prependSettlement(evt.data); break;
        case 'new_market': prependNewMarket(evt.data); break;
        case 'smart_money_trade': prependSmartMoneyTrade(evt.data); break;
        case 'price_move': break;
      }
    } catch (e) { console.error('SSE parse error:', e); }
  };
  evtSource.onerror = function() {
    console.warn('SSE connection lost, reconnecting in 5s...');
    evtSource.close();
    setTimeout(connectSSE, 5000);
  };
}

const _escEl = document.createElement('div');
function esc(s) {
  if (!s) return '';
  _escEl.textContent = s;

}
function shortAddr(addr) {
  if (!addr) return '';
  if (addr.length < 12) return addr;
  return addr.slice(0, 8) + '...' + addr.slice(-4);
}
function formatUSD(val) {
  if (!val) return '$0';
  if (val >= 1000000) return '$' + (val / 1000000).toFixed(1) + 'M';
  if (val >= 1000) return '$' + Math.round(val).toLocaleString();
  return '$' + val.toFixed(0);
}
function relativeTime(tsMs) {
  if (!tsMs) return '';
  let ts = tsMs;
  if (ts < 1e12) ts = ts * 1000;
  const diff = Date.now() - ts;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
  return Math.floor(diff / 86400000) + '天前';
}
function relativeTimeISO(isoStr) {
  if (!isoStr) return '';
  const ts = new Date(isoStr).getTime();
  if (isNaN(ts)) return '';
  const diff = Date.now() - ts;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
  return Math.floor(diff / 86400000) + '天前';
}

// --- Whale modal ---
function openWhaleModal() {
  document.getElementById('whale-modal').classList.add('open');
  var saved = localStorage.getItem('polyscan_admin_token');
  if (saved) document.getElementById('wm-token').value = saved;
  document.getElementById('wm-addr').focus();
}
function closeWhaleModal() {
  document.getElementById('whale-modal').classList.remove('open');
}
function wmToast(text, ok) {
  var el = document.createElement('div');
  el.className = 'wm-toast ' + (ok ? 'ok' : 'err');
  el.textContent = text;
  document.getElementById('wm-toast-wrap').appendChild(el);
  setTimeout(function(){ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(function(){ el.remove(); }, 300); }, 3500);
}
function submitWhale() {
  var addr = document.getElementById('wm-addr').value.trim();
  var alias = document.getElementById('wm-alias').value.trim();
  var token = document.getElementById('wm-token').value.trim();
  if (!token) { wmToast('请输入管理员 Token', false); return; }
  if (!addr || !addr.startsWith('0x') || addr.length !== 42) { wmToast('请输入有效地址 (0x, 42字符)', false); return; }
  localStorage.setItem('polyscan_admin_token', token);
  var btn = document.getElementById('wm-submit');
  btn.disabled = true; btn.textContent = '添加中…';
  fetch('/api/whales', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ address: addr, alias: alias })
  }).then(function(r){ return r.json().then(function(d){ return {ok:r.ok, data:d}; }); })
  .then(function(res) {
    if (!res.ok) { wmToast(res.data.error || '添加失败', false); return; }
    wmToast('已添加: ' + addr.slice(0,8) + '…', true);
    document.getElementById('wm-addr').value = '';
    document.getElementById('wm-alias').value = '';
    closeWhaleModal();
  }).catch(function(e){ wmToast('请求失败: ' + e.message, false); })
  .finally(function(){ btn.disabled = false; btn.textContent = '添加'; });
}
document.getElementById('wm-addr').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { var a = document.getElementById('wm-alias'); if (!a.value.trim()) a.focus(); else submitWhale(); }
});
document.getElementById('wm-alias').addEventListener('keydown', function(e) { if (e.key === 'Enter') submitWhale(); });
document.getElementById('wm-token').addEventListener('keydown', function(e) { if (e.key === 'Enter') submitWhale(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeWhaleModal(); closeSmModal(); } });

// Refresh relative times every 30s
setInterval(function() {
  document.querySelectorAll('.trade-time[data-ts]').forEach(el => {
    const ts = parseInt(el.dataset.ts, 10);
    if (!ts) return;
    const newText = relativeTime(ts);
    // Only update the first text node to preserve action buttons inside
    const firstText = el.childNodes[0];
    if (firstText && firstText.nodeType === 3) {
      firstText.textContent = newText;
    } else {
      el.insertBefore(document.createTextNode(newText), el.firstChild);
    }
  });
  document.querySelectorAll('.item-meta[data-iso]').forEach(el => {
    const iso = el.dataset.iso;
    if (!iso) return;
    const outcomeSpan = el.querySelector('.settlement-outcome');
    if (outcomeSpan) {
      el.innerHTML = relativeTimeISO(iso) + ' · ' + outcomeSpan.outerHTML;
    } else {
      el.textContent = relativeTimeISO(iso);
    }
  });
}, 30000);
